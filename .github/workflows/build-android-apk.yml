name: Build Orion Tracker APK

on:
  push:
    branches: [ main, "claude/*" ]
    paths:
      - 'android_app/**'
      - '.github/workflows/build-android-apk.yml'
  workflow_dispatch:   # lancement manuel depuis l'interface GitHub

jobs:
  build-apk:
    name: Build APK (Kivy / Buildozer)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── 1. Récupération du code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/create-new-program-5C2gR

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dépendances système (NDK, build tools) ─────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev sqlite3 \
            bzip2 libbz2-dev lzma liblzma-dev libreadline-dev \
            openjdk-17-jdk

      # ── 4. Buildozer + dépendances Python ────────────────────────────
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sh==1.14.2" buildozer cython

      # ── 5. Cache Buildozer (SDK/NDK/p4a) ─────────────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 6. Compilation APK ────────────────────────────────────────────
      - name: Build APK
        working-directory: android_app
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      # ── 7. Vérification ──────────────────────────────────────────────
      - name: Verify APK exists
        run: |
          APK=$(find android_app/bin -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "❌ APK non trouvé !"
            cat android_app/build.log | tail -50
            exit 1
          fi
          echo "✅ APK généré : $APK"
          ls -lh "$APK"

      # ── 8. Upload artifact (téléchargeable depuis GitHub Actions) ────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orion-tracker-debug-apk
          path: android_app/bin/*.apk
          retention-days: 30

      # ── 9. Log en cas d'échec ─────────────────────────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 7

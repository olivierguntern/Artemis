name: Build Orion Tracker APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branche source (code Android)'
        required: false
        default: 'claude/create-new-program-5C2gR'

jobs:
  build-apk:
    name: Build APK v1.1 (Kivy / Buildozer)
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout code Android
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev sqlite3 \
            bzip2 libbz2-dev lzma liblzma-dev libreadline-dev \
            openjdk-17-jdk

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "sh==1.14.2" buildozer cython

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        working-directory: android_app
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Verify APK
        run: |
          APK=$(find android_app/bin -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "APK non trouve"
            tail -50 android_app/build.log
            exit 1
          fi
          echo "APK OK : $APK"
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: orion-tracker-v1.1-debug
          path: android_app/bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android_app/build.log
          retention-days: 7
